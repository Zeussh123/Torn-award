<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torn Awards Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;500;600;700&display=swap');
:root{--bg:#0d0d0f;--surf:#141417;--surf2:#1c1c21;--brd:#2a2a32;--text:#e8e8f0;--muted:#6b6b80;--red:#e94560;--red-d:rgba(233,69,96,.15);--amber:#f5a623;--amber-d:rgba(245,166,35,.12);--green:#2ecc71;--green-d:rgba(46,204,113,.12);--blue:#4a9eff;--blue-d:rgba(74,158,255,.12);--mono:'Share Tech Mono',monospace;--sans:'Inter',sans-serif}
body.blue{--bg:#060d1a;--surf:#0d1b2e;--surf2:#112236;--brd:#1c3354;--text:#dde8f8;--muted:#4d6a8a;--blue:#5ba8ff;--blue-d:rgba(91,168,255,.15)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;transition:background .3s}
nav{position:sticky;top:0;z-index:100;background:rgba(13,13,15,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--brd);padding:0 20px;display:flex;align-items:center;gap:12px;height:54px}
body.blue nav{background:rgba(6,13,26,.96)}
.logo{font-family:var(--mono);font-size:14px;color:var(--red);letter-spacing:2px;white-space:nowrap}
.logo small{color:var(--muted);font-size:10px;display:block;letter-spacing:1px}
.sp{flex:1}
.nbtn{background:var(--surf2);border:1px solid var(--brd);color:var(--muted);padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
.nbtn:hover,.nbtn.on{border-color:var(--red);color:var(--red);background:var(--red-d)}
.tbtn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;padding:0}

/* LOGIN */
#login{max-width:500px;margin:70px auto;padding:0 20px;text-align:center}
#login h1{font-size:28px;font-weight:700;margin-bottom:8px}
#login h1 em{color:var(--red);font-style:normal}
#login p{color:var(--muted);font-size:13px;margin-bottom:28px;line-height:1.7}
.row{display:flex;gap:8px}
.row input{flex:1;background:var(--surf);border:1px solid var(--brd);color:var(--text);padding:11px 15px;border-radius:8px;font-family:var(--mono);font-size:13px;outline:none;transition:.2s}
.row input:focus{border-color:var(--red)}
.btn{background:var(--red);color:#fff;border:none;padding:11px 20px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;transition:.15s;white-space:nowrap}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:not-allowed}
.note{margin-top:14px;font-size:11px;color:var(--muted);line-height:1.8}
.note a{color:var(--blue);text-decoration:none}
.note strong{color:var(--amber)}
.lngs{display:flex;gap:8px;justify-content:center;margin-bottom:22px}
.lbtn{background:var(--surf2);border:1px solid var(--brd);color:var(--muted);padding:6px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
.lbtn.on{background:var(--red-d);border-color:var(--red);color:var(--red)}

/* STATSBAR */
#sbar{display:none;background:var(--surf);border-bottom:1px solid var(--brd);padding:10px 20px;gap:10px;flex-wrap:wrap;align-items:center}
.chip{background:var(--surf2);border:1px solid var(--brd);border-radius:20px;padding:4px 12px;font-size:11px;font-family:var(--mono)}
.chip span{color:var(--red);font-weight:700}
.chip.rush{border-color:rgba(233,69,96,.3)}

/* TABS */
#tabs{display:none;border-bottom:1px solid var(--brd);padding:0 20px;overflow-x:auto;white-space:nowrap;background:var(--bg)}
.tab{display:inline-block;padding:12px 16px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.tab:hover{color:var(--text)}
.tab.on{color:var(--red);border-color:var(--red)}

/* MAIN */
#main{max-width:1100px;margin:0 auto;padding:20px}

/* RUSH */
.rbox{background:var(--surf);border:1px solid var(--brd);border-radius:10px;margin-bottom:10px;overflow:hidden}
.rhdr{padding:11px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--brd)}
.rhdr h3{font-size:13px;font-weight:700}
.rhdr .cnt{font-family:var(--mono);font-size:11px;color:var(--muted)}
.rrow{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-bottom:1px solid var(--brd);transition:.15s;cursor:pointer}
.rrow:last-child{border-bottom:none}
.rrow:hover{background:var(--surf2)}
.rinfo{flex:1}
.rname{font-size:13px;font-weight:600;margin-bottom:3px}
.rdesc{font-size:11px;color:var(--muted);line-height:1.5}
.rright{text-align:right;flex-shrink:0;min-width:90px}
.rnum{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--red)}
.rstat{font-size:10px;color:var(--muted);font-family:var(--mono)}
.rbadge{display:inline-block;font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:3px;margin-left:5px;vertical-align:middle}
.bh{background:var(--blue-d);color:var(--blue);border:1px solid rgba(74,158,255,.25)}
.bm{background:var(--amber-d);color:var(--amber);border:1px solid rgba(245,166,35,.25)}
.bd{background:var(--green-d);color:var(--green);border:1px solid rgba(46,204,113,.25)}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.card{background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:14px;transition:.15s}
.card:hover{border-color:#3a3a50}
.card.rush{border-color:rgba(233,69,96,.35);background:linear-gradient(135deg,rgba(233,69,96,.04),var(--surf))}
.card.done{opacity:.4}
.chtop{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.chname{font-weight:600;font-size:13px;line-height:1.3}
.chdesc{font-size:11px;color:var(--muted);margin-bottom:10px;line-height:1.5;border-left:2px solid var(--brd);padding-left:7px}
.pbar{display:flex;align-items:center;gap:8px}
.ptrack{flex:1;height:3px;background:var(--brd);border-radius:2px;overflow:hidden}
.pfill{height:100%;border-radius:2px;transition:width .4s}
.ph{background:var(--red)}.pm{background:var(--amber)}.pl{background:var(--blue)}.pd{background:var(--green)}
.ppct{font-family:var(--mono);font-size:10px;color:var(--muted);width:34px;text-align:right}
.pnums{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:3px}
.pnums strong{color:var(--text)}

/* COMBO */
.cbox{background:var(--surf);border:1px solid rgba(245,166,35,.2);border-radius:10px;padding:16px;margin-bottom:10px}
.cbox h3{color:var(--amber);font-family:var(--mono);font-size:11px;letter-spacing:1px;margin-bottom:4px}
.cdesc{color:var(--muted);font-size:12px;margin-bottom:12px;line-height:1.5}
.crow{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px}
.cdot{width:5px;height:5px;border-radius:50%;background:var(--amber);flex-shrink:0}
.cdone{opacity:.4}.cdone .cdot{background:var(--green)}

/* FILTERS */
.fbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.fbar input{background:var(--surf);border:1px solid var(--brd);color:var(--text);padding:7px 12px;border-radius:6px;font-size:12px;outline:none;width:200px}
.fbar input:focus{border-color:var(--red)}
.fcat{background:var(--surf2);border:1px solid var(--brd);color:var(--muted);padding:6px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:.15s}
.fcat:hover{border-color:var(--red);color:var(--text)}
.fcat.on{background:var(--red-d);border-color:var(--red);color:var(--red)}
.tlbl{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;cursor:pointer;margin-left:auto}
.tlbl input{accent-color:var(--red)}
.rarity{font-size:10px;font-family:var(--mono);color:var(--muted);margin-top:3px}

/* LOADING/ERR */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:14px;color:var(--muted)}
.spin{width:28px;height:28px;border:2px solid var(--brd);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:var(--red-d);border:1px solid rgba(233,69,96,.3);border-radius:8px;padding:14px 18px;color:var(--red);font-size:13px;margin:20px 0}
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:13px}
.sec{font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--brd)}

@media(max-width:600px){.grid{grid-template-columns:1fr}nav{padding:0 12px}#main{padding:12px}.fbar{gap:4px}}
</style>
</head>
<body class="blue">
<nav>
  <div class="logo">DARKPULSE<small>AWARDS TRACKER</small></div>
  <div class="sp"></div>
  <div id="nlngs" style="display:none;gap:6px"></div>
  <button class="nbtn tbtn" onclick="toggleTheme()" id="tbtn">🌑</button>
</nav>

<div id="login">
  <div class="lngs">
    <button class="lbtn on" onclick="setLang('en')" id="len">🇬🇧 English</button>
    <button class="lbtn" onclick="setLang('fr')" id="lfr">🇫🇷 Français</button>
  </div>
  <h1 id="tt"></h1>
  <p id="ts"></p>
  <div class="row">
    <input type="password" id="key" placeholder="Your Torn API key..." autocomplete="off"/>
    <button class="btn" id="lbtn" onclick="go()">Load</button>
  </div>
  <p class="note" id="tn"></p>
</div>

<div id="sbar"></div>
<div id="tabs" style="display:none"></div>
<div id="main" style="display:none"></div>

<script>
// ══ I18N ══
const T={
  en:{title:'Track Your <em>Torn Awards</em>',sub:'Enter your API key to see your progress, find rushable awards & smart combos.',note:'Key never stored — requests go directly to Torn API from your browser.<br>Get key at <a href="https://www.torn.com/preferences.php#tab=api" target="_blank">torn.com → Preferences → API</a> (Limited access is enough)<br><strong>⚠️ Must be hosted (GitHub Pages / Netlify) — local file:// won\'t work.</strong>',load:'Load',change:'Change Key',rush:'🔥 Rush',combos:'⚡ Combos',all:'All',attacks:'⚔️ Attacks',weapons:'🔫 Weapons',crimes:'🕵️ Crimes',travel:'✈️ Travel',drugs:'💊 Drugs',casino:'🎰 Casino',misc:'🎲 Misc',gym:'💪 Gym',t1:'⚡ Do it NOW — within 50',t2:'🔥 This week — within 200',t3:'🎯 Within 1,000',t4:'📅 Within 5,000',noRush:'No rushable awards found!',noAwards:'No awards match your filters.',showEarned:'Show earned',search:'Search...',how:'How:',left:'left',earned:'✓ Done',comboTitle:'⚡ Combos — Grind Multiple at Once',comboSub:'These award groups all progress from the same action.',loading:'Loading awards from Torn API...'},
  fr:{title:'Suivi de Vos <em>Awards Torn</em>',sub:'Entrez votre clé API pour voir votre progression, trouver ce que vous pouvez rusher et découvrir des combos.',note:'Clé jamais stockée — les requêtes vont directement à l\'API Torn depuis votre navigateur.<br>Obtenez votre clé sur <a href="https://www.torn.com/preferences.php#tab=api" target="_blank">torn.com → Préférences → API</a> (Accès limité suffit)<br><strong>⚠️ Doit être hébergé (GitHub Pages / Netlify) — le fichier local file:// ne fonctionne pas.</strong>',load:'Charger',change:'Changer de clé',rush:'🔥 Rush',combos:'⚡ Combos',all:'Tous',attacks:'⚔️ Attaques',weapons:'🔫 Armes',crimes:'🕵️ Crimes',travel:'✈️ Voyage',drugs:'💊 Drogues',casino:'🎰 Casino',misc:'🎲 Misc',gym:'💪 Gym',t1:'⚡ À faire MAINTENANT — moins de 50',t2:'🔥 Cette semaine — moins de 200',t3:'🎯 Moins de 1 000',t4:'📅 Moins de 5 000',noRush:'Aucun award à rusher trouvé !',noAwards:'Aucun award ne correspond à vos filtres.',showEarned:'Afficher obtenus',search:'Rechercher...',how:'Comment:',left:'restant',earned:'✓ Obtenu',comboTitle:'⚡ Combos — Plusieurs Awards en Même Temps',comboSub:'Ces groupes d\'awards progressent tous avec la même action.',loading:'Chargement des awards depuis l\'API Torn...'}
};

// Map honor/medal type to category tab
const TYPE_CAT={
  'attacking':'attacks','camo':'attacks','weapons':'weapons','crimes':'crimes',
  'travel':'travel','drugs':'drugs','casino':'casino','gym':'gym',
  'misc':'misc','money':'misc','hospital':'misc','jail':'misc',
  'education':'misc','items':'misc','missions':'misc','competitions':'misc',
  'commitment':'misc','level':'misc','networth':'misc','default':'misc'
};

// Stat key mapping from description keywords
function guessStatKey(desc,name){
  const d=desc.toLowerCase(),n=name.toLowerCase();
  if(d.includes('kill streak')||d.includes('best kill streak')) return 'bestkillstreak';
  if(d.includes('win') && d.includes('attack')) return 'attackswon';
  if(d.includes('critical hit')) return 'attackcriticalhits';
  if(d.includes('stealthed attack')) return 'attacksstealthed';
  if(d.includes('defend')) return 'defendswon';
  if(d.includes('assist')) return 'attacksassisted';
  if(d.includes('one hit kill')) return 'onehitkills';
  if(d.includes('finishing hit') && d.includes('rifle')) return 'rifhits';
  if(d.includes('finishing hit') && d.includes('smg')) return 'smghits';
  if(d.includes('finishing hit') && d.includes('pistol')) return 'pishits';
  if(d.includes('finishing hit') && d.includes('shotgun')) return 'shohits';
  if(d.includes('finishing hit') && d.includes('slashing')) return 'slahits';
  if(d.includes('finishing hit') && d.includes('piercing')) return 'piehits';
  if(d.includes('finishing hit') && d.includes('clubbing')) return 'axehits';
  if(d.includes('finishing hit') && d.includes('mechanical')) return 'machits';
  if(d.includes('finishing hit') && d.includes('fist')) return 'h2hhits';
  if(d.includes('finishing hit') && d.includes('kick')) return 'h2hhits';
  if(d.includes('finishing hit') && d.includes('heavy artillery')) return 'machits';
  if(d.includes('finishing hit') && d.includes('machine gun')) return 'machits';
  if(d.includes('finishing hit') && d.includes('temporary')) return 'grehits';
  if(d.includes('fire') && d.includes('round')) return 'roundsfired';
  if(d.includes('bounty') && d.includes('collect')) return 'bountiescollected';
  if(d.includes('bounty') && d.includes('place')) return 'bountiesplaced';
  if(d.includes('mug')) return 'moneymugged';
  if(d.includes('theft crime')) return 'theft';
  if(d.includes('vandalism')||d.includes('vandal')||d.includes('graffiti crew')) return 'vandalism';
  if(d.includes('fraud')) return 'fraud';
  if(d.includes('criminal offense')||d.includes('criminal offenses')) return 'criminaloffenses';
  if(d.includes('computer crime')) return 'cybercrime';
  if(d.includes('organized crime')) return 'organisedcrimes';
  if(d.includes('murder crime')) return 'criminaloffenses';
  if(d.includes('auto theft')) return 'criminaloffenses';
  if(d.includes('drug dealing')||d.includes('drug crime')) return 'drugsused';
  if(d.includes('travel') && d.includes('time')) return 'traveltimes';
  if(d.includes('travel') && d.includes('100 time')) return 'traveltimes';
  if(d.includes('travel') && d.includes('25 time')) return 'traveltimes';
  if(d.includes('travel') && d.includes('500 time')) return 'traveltimes';
  if(d.includes('travel') && d.includes('1,000 time')) return 'traveltimes';
  if(d.includes('import')) return 'itemsboughtabroad';
  if(d.includes('xanax')) return 'xantaken';
  if(d.includes('ecstasy')) return 'exttaken';
  if(d.includes('cannabis')) return 'cantaken';
  if(d.includes(' drug')) return 'drugsused';
  if(d.includes('race')) return 'racesentered';
  if(d.includes('networth')||d.includes('$100,000 for')||d.includes('$1,000,000 for')||d.includes('recorded networth')) return 'networth';
  if(d.includes('donator')) return 'daysbeendonator';
  if(d.includes('strength')) return 'strength';
  if(d.includes('defense')) return 'defense';
  if(d.includes('dexterity')) return 'dexterity';
  if(d.includes('speed')) return 'speed';
  if(d.includes('total stat')) return 'totalstats';
  if(d.includes('hospital')) return 'hospital';
  if(d.includes('active') && d.includes('day')) return 'activestreak';
  if(d.includes('job point')) return 'jobpointsused';
  if(d.includes('medical item')) return 'medicalitemsused';
  if(d.includes('city') && d.includes('find')) return 'cityfinds';
  return null;
}

function getGoalFromDesc(desc){
  // Extract number from description
  const m=desc.match(/(?:achieve|win|commit|travel|fire|collect|use|find|import|bust|reach level|reach the rank|have|make|earn|attain|participate in|complete|gain)\s+(?:a\s+)?(?:total of\s+)?(?:best\s+)?(?:kill streak of\s+)?([\d,]+)/i);
  if(m) return parseInt(m[1].replace(/,/g,''));
  const m2=desc.match(/\$([\d,]+)/);
  if(m2) return parseInt(m2[1].replace(/,/g,''));
  return null;
}

// ══ STATE ══
let lang=localStorage.getItem('lang')||'en';
let theme=localStorage.getItem('theme')||'blue';
let S={tab:'rush',search:'',showEarned:false,data:null,allAwards:null};

// ══ INIT ══
(function(){
  document.body.className=theme==='blue'?'blue':'';
  document.getElementById('tbtn').textContent=theme==='blue'?'🌑':'🌊';
  applyLang();
  document.getElementById('key').addEventListener('keydown',e=>{if(e.key==='Enter')go()});
})();

function applyLang(){
  const t=T[lang];
  document.getElementById('tt').innerHTML=t.title;
  document.getElementById('ts').textContent=t.sub;
  document.getElementById('tn').innerHTML=t.note;
  document.getElementById('lbtn').textContent=t.load;
  document.getElementById('len').classList.toggle('on',lang==='en');
  document.getElementById('lfr').classList.toggle('on',lang==='fr');
  // Nav lang buttons
  const nl=document.getElementById('nlngs');
  nl.innerHTML=`<button class="nbtn${lang==='en'?' on':''}" onclick="setLang('en')">EN</button><button class="nbtn${lang==='fr'?' on':''}" onclick="setLang('fr')">FR</button>`;
  if(S.data) renderContent();
}

function setLang(l){lang=l;localStorage.setItem('lang',l);applyLang();}
function toggleTheme(){theme=theme==='blue'?'dark':'blue';localStorage.setItem('theme',theme);document.body.className=theme==='blue'?'blue':'';document.getElementById('tbtn').textContent=theme==='blue'?'🌑':'🌊';}
const fmt=n=>Number(n).toLocaleString();
const t=k=>T[lang][k]||k;

// ══ LOAD DATA ══
async function go(){
  const key=document.getElementById('key').value.trim();
  if(!key)return;
  const btn=document.getElementById('lbtn');
  btn.disabled=true;btn.textContent='...';
  document.getElementById('login').style.display='none';
  document.getElementById('main').style.display='block';
  document.getElementById('main').innerHTML=`<div class="loading"><div class="spin"></div><span>${t('loading')}</span></div>`;

  try{
    // Load everything in parallel
    const [u1,u2,torn1,torn2]=await Promise.all([
      fetch(`https://api.torn.com/user/?selections=profile,honors,medals&key=${key}`).then(r=>r.json()),
      fetch(`https://api.torn.com/user/?selections=personalstats&key=${key}`).then(r=>r.json()),
      fetch(`https://api.torn.com/v2/torn/honors?key=${key}`).then(r=>r.json()),
      fetch(`https://api.torn.com/v2/torn/medals?key=${key}`).then(r=>r.json()),
    ]);

    if(u1.error) throw new Error(u1.error.error);
    if(u2.error) throw new Error(u2.error.error);

    // Build award DB from API data (filter out default/country honors)
    // Filter out: default/country honors AND Crimes 1.0 legacy honors
    const honorsDB=(torn1.honors||[]).filter(h=>h.type&&h.type.title!=='default'&&h.crimes_version!=='v1');
    // Filter out Crimes 1.0 legacy medals
    const medalsDB=(torn2.medals||[]).filter(m=>m.crimes_version!=='v1');

    S.data={
      name:u1.name,level:u1.level,age:u1.age,rank:u1.rank,
      earned_h:new Set(u1.honors_awarded||[]),
      earned_m:new Set(u1.medals_awarded||[]),
      stats:u2.personalstats||{},
    };

    // Build computed award list
    S.allAwards=buildAwards(honorsDB,medalsDB,S.data);

    renderSbar();
    renderTabs();
    renderContent();
    document.getElementById('nlngs').style.display='flex';
  }catch(e){
    document.getElementById('main').innerHTML=`<div class="err">❌ ${e.message}<br><small>Check your API key and make sure this page is hosted (not opened as a local file).</small></div>`;
    document.getElementById('login').style.display='block';
  }
  btn.disabled=false;btn.textContent=t('load');
}

function buildAwards(honorsDB,medalsDB,data){
  const {earned_h,earned_m,stats}=data;
  const out=[];

  for(const h of honorsDB){
    const earned=earned_h.has(h.id);
    const statKey=guessStatKey(h.description,h.name);
    const goal=getGoalFromDesc(h.description);
    const cat=TYPE_CAT[h.type?.title||'misc']||'misc';
    const val=statKey?Math.max(0,stats[statKey]||0):0;
    const pct=goal&&statKey?Math.min(100,Math.round(val/goal*1000)/10):0;
    const left=goal&&statKey?Math.max(0,goal-val):null;
    out.push({id:h.id,type:'H',name:h.name,desc:h.description,rarity:h.rarity||'',cat,statKey,goal,val,pct,left,earned});
  }

  for(const m of medalsDB){
    const earned=earned_m.has(m.id);
    const statKey=guessStatKey(m.description,m.name);
    const goal=getGoalFromDesc(m.description);
    const cat=TYPE_CAT[m.type?.title||'misc']||'misc';
    const val=statKey?Math.max(0,stats[statKey]||0):0;
    const pct=goal&&statKey?Math.min(100,Math.round(val/goal*1000)/10):0;
    const left=goal&&statKey?Math.max(0,goal-val):null;
    out.push({id:m.id,type:'M',name:m.name,desc:m.description,rarity:m.rarity||'',cat,statKey,goal,val,pct,left,earned});
  }

  return out;
}

// ══ STATS BAR ══
function renderSbar(){
  const {name,level,rank,earned_h,earned_m}=S.data;
  const all=S.allAwards;
  const rushable=all.filter(a=>!a.earned&&a.left!==null&&a.left>0&&a.left<=500).length;
  const sbar=document.getElementById('sbar');
  sbar.style.display='flex';
  sbar.innerHTML=`
    <strong style="font-size:15px">${name}</strong>
    <span style="color:var(--muted);font-size:11px;font-family:var(--mono)">Lvl ${level} · ${rank}</span>
    <div class="sp"></div>
    <div class="chip">Honors <span>${earned_h.size}</span></div>
    <div class="chip">Medals <span>${earned_m.size}</span></div>
    <div class="chip rush">🔥 <span>${rushable}</span> rushable</div>
    <button class="nbtn" onclick="logout()">${t('change')}</button>
  `;
}

// ══ TABS ══
function renderTabs(){
  const tabs=['rush','combos','all','attacks','weapons','crimes','travel','drugs','casino','gym','misc'];
  const el=document.getElementById('tabs');
  el.style.display='block';
  el.innerHTML=tabs.map(tab=>`<div class="tab${S.tab===tab?' on':''}" data-tab="${tab}" onclick="setTab('${tab}')">${t(tab)||tab}</div>`).join('');
}

function setTab(tab){
  S.tab=tab;
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('on',el.dataset.tab===tab));
  renderContent();
}

// ══ RENDER CONTENT ══
function renderContent(){
  const el=document.getElementById('main');
  if(!S.data||!S.allAwards)return;
  if(S.tab==='rush'){renderRush(el);return;}
  if(S.tab==='combos'){renderCombos(el);return;}
  renderGrid(el);
}

// ── RUSH ──
function renderRush(el){
  const all=S.allAwards.filter(a=>!a.earned&&a.left!==null&&a.left>0);
  all.sort((a,b)=>a.left-b.left);

  const tiers=[
    {k:'t1',max:50,items:all.filter(a=>a.left<=50)},
    {k:'t2',max:200,items:all.filter(a=>a.left>50&&a.left<=200)},
    {k:'t3',max:1000,items:all.filter(a=>a.left>200&&a.left<=1000)},
    {k:'t4',max:5000,items:all.filter(a=>a.left>1000&&a.left<=5000)},
  ];

  let html='';
  for(const tier of tiers){
    if(!tier.items.length)continue;
    html+=`
      <div class="rbox">
        <div class="rhdr"><h3>${t(tier.k)}</h3><span class="cnt">${tier.items.length} award${tier.items.length>1?'s':''}</span></div>
        ${tier.items.map(a=>`
          <a class="rrow" href="https://www.torn.com/page.php?sid=awards&tab=${a.type==='H'?'honors':'medals'}" target="_blank" style="text-decoration:none;color:inherit;display:flex">
            <img src="https://yata.yt/media/${a.type==='H'?'honors':'medals'}/${a.id}.png" 
                 style="width:32px;height:32px;object-fit:contain;flex-shrink:0;margin-right:4px;align-self:center"
                 onerror="this.style.display='none'" loading="lazy"/>
            <div class="rinfo">
              <div class="rname">${a.name}<span class="rbadge ${a.type==='H'?'bh':'bm'}">${a.type==='H'?'HONOR':'MEDAL'}</span></div>
              <div class="rdesc"><strong style="color:var(--amber);font-size:10px">${t('how')} </strong>${a.desc}</div>
              ${a.rarity?`<div class="rarity">${a.rarity}</div>`:''}
            </div>
            <div class="rright">
              <div class="rnum">${fmt(a.left)} ${t('left')}</div>
              <div class="rstat">${a.statKey||'?'}</div>
              <div class="rstat" style="color:var(--muted)">${fmt(a.val)}/${fmt(a.goal)}</div>
            </div>
          </a>
        `).join('')}
      </div>
    `;
  }
  el.innerHTML=html||`<div class="empty">${t('noRush')}</div>`;
}

// ── COMBOS ──
function renderCombos(el){
  const COMBOS=[
    {name:'Attack Wins + Camos',name_fr:'Victoires + Camos',desc:'Every attack win counts toward ALL camo honors AND attack medals simultaneously.',desc_fr:'Chaque victoire compte pour TOUS les camos ET les médailles d\'attaque en même temps.',statKey:'attackswon'},
    {name:'Rifle Hits',name_fr:'Frappes Fusil',desc:'Use a rifle to finish attacks — every finishing hit advances all rifle tiers at once.',desc_fr:'Utilise un fusil pour terminer les attaques — chaque coup final avance tous les niveaux en même temps.',statKey:'rifhits'},
    {name:'Slash Hits',name_fr:'Frappes Tranchantes',desc:'Use a slashing weapon to finish attacks — every finishing hit advances all slash tiers at once.',desc_fr:'Utilise une arme tranchante — chaque coup final avance tous les niveaux tranchants en même temps.',statKey:'slahits'},
    {name:'Crimes Combo',name_fr:'Combo Crimes',desc:'Theft crimes count toward Theft honors AND total criminal offenses medals. Vandalism also counts toward criminal offenses.',desc_fr:'Les crimes de vol comptent pour les honors Vol ET les médailles d\'offenses totales. Le vandalisme compte aussi.',statKey:'criminaloffenses'},
    {name:'Rounds Fired',name_fr:'Cartouches Tirées',desc:'Every round fired advances Spray And Pray, Two Halves, Lead Salad AND Peppered simultaneously.',desc_fr:'Chaque balle tirée fait progresser Spray And Pray, Two Halves, Lead Salad ET Peppered en même temps.',statKey:'roundsfired'},
  ];

  const {earned_h,earned_m,stats}=S.data;
  let html=`<div class="sec">${t('comboTitle')}</div><p style="color:var(--muted);font-size:12px;margin-bottom:14px">${t('comboSub')}</p>`;

  for(const combo of COMBOS){
    const relatedAwards=S.allAwards.filter(a=>a.statKey===combo.statKey&&!a.earned&&a.left!==null).sort((a,b)=>a.left-b.left).slice(0,8);
    if(!relatedAwards.length)continue;

    html+=`
      <div class="cbox">
        <h3>${lang==='fr'?combo.name_fr:combo.name}</h3>
        <div class="cdesc">${lang==='fr'?combo.desc_fr:combo.desc}</div>
        ${relatedAwards.map(a=>`
          <div class="crow ${a.earned?'cdone':''}">
            <div class="cdot"></div>
            <div style="flex:1">${a.name} <span style="color:var(--muted);font-size:10px">[${a.type==='H'?'Honor':'Medal'}]</span></div>
            <div style="font-family:var(--mono);font-size:11px;color:${a.earned?'var(--green)':'var(--red)'}">
              ${a.earned?t('earned'):fmt(a.left)+' '+t('left')}
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }
  el.innerHTML=html;
}

// ── GRID ──
function renderGrid(el){
  let all=S.allAwards;
  if(S.tab!=='all') all=all.filter(a=>a.cat===S.tab);
  if(!S.showEarned) all=all.filter(a=>!a.earned);
  if(S.search){
    const q=S.search.toLowerCase();
    all=all.filter(a=>a.name.toLowerCase().includes(q)||a.desc.toLowerCase().includes(q));
  }
  all.sort((a,b)=>b.pct-a.pct);

  const fbar=`
    <div class="fbar">
      <input type="search" placeholder="${t('search')}" oninput="S.search=this.value;renderContent()" value="${S.search}"/>
      <label class="tlbl"><input type="checkbox" ${S.showEarned?'checked':''} onchange="S.showEarned=this.checked;renderContent()"/> ${t('showEarned')}</label>
    </div>
  `;

  if(!all.length){el.innerHTML=fbar+`<div class="empty">${t('noAwards')}</div>`;return;}

  const cards=all.map(a=>{
    const isRush=!a.earned&&a.left!==null&&a.left>0&&a.left<=500;
    const fc=a.earned?'pd':(a.pct>=80?'ph':(a.pct>=50?'pm':'pl'));
    const badge=a.earned?`<span class="rbadge bd">${t('earned')}</span>`:(isRush?`<span class="rbadge" style="background:var(--red-d);color:var(--red);border:1px solid rgba(233,69,96,.3)">🔥RUSH</span>`:`<span class="rbadge ${a.type==='H'?'bh':'bm'}">${a.type==='H'?'HONOR':'MEDAL'}</span>`);
    return `
      <div class="card ${a.earned?'done':(isRush?'rush':'')}">
        <div class="chtop"><div class="chname">${a.name}</div>${badge}</div>
        <div class="chdesc">${a.desc}</div>
        ${a.goal&&a.statKey?`
          <div class="pbar"><div class="ptrack"><div class="pfill ${fc}" style="width:${a.pct}%"></div></div><div class="ppct">${a.pct}%</div></div>
          <div class="pnums"><strong>${fmt(a.val)}</strong> / ${fmt(a.goal)}${!a.earned&&a.left!==null?` — <strong>${fmt(a.left)}</strong> ${t('left')}`:''}</div>
        `:`<div class="pnums" style="color:var(--muted)">No progress tracking for this award</div>`}
        ${a.rarity?`<div class="rarity">${a.rarity}</div>`:''}
      </div>
    `;
  }).join('');

  el.innerHTML=fbar+`<div class="grid">${cards}</div>`;
}

function logout(){
  S.data=null;S.allAwards=null;
  document.getElementById('login').style.display='block';
  document.getElementById('main').style.display='none';
  document.getElementById('sbar').style.display='none';
  document.getElementById('tabs').style.display='none';
  document.getElementById('nlngs').style.display='none';
  document.getElementById('key').value='';
}
</script>
</body>
</html>
